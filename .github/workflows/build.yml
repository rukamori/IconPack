name: Build submitted icons

on:
  workflow_dispatch:

  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    paths:
      - metadata.json
      - submissions/**/*.svg

concurrency:
  group: icon-submission-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Process icon pack changes
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    env:
      ICON_RANDOM_DIGITS: 6

    steps:
      - name: Require PAT
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
        run: |
          if [ -z "$ICON_PACK_PAT" ]; then
            echo "::error::Repository secret ICON_PACK_PAT is required."
            exit 1
          fi

      - name: Checkout trusted workflow source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          persist-credentials: false

      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: submission
          persist-credentials: false

      - name: Fetch trusted base revision
        working-directory: submission
        env:
          BASE_REPOSITORY: ${{ github.repository }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git remote add upstream "https://github.com/${BASE_REPOSITORY}.git"
          git fetch --no-tags upstream "$BASE_SHA"

      - name: Validate and store SVG submissions
        working-directory: submission
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 ../trusted/.github/scripts/process_icon_submission.py \
            --mode pull-request \
            --event-path "$GITHUB_EVENT_PATH" \
            --base-sha "$BASE_SHA" \
            --random-digits "$ICON_RANDOM_DIGITS"

      - name: Install vector preview renderer
        run: |
          sudo apt-get update
          sudo apt-get install --yes librsvg2-bin

      - name: Render stored SVG previews
        working-directory: submission
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python3 ../trusted/.github/scripts/icon_preview.py generate \
            --base-sha "$BASE_SHA" \
            --metadata metadata.json \
            --svg-directory svg \
            --output-directory previews \
            --manifest /tmp/icon-preview-manifest.json \
            --renderer /usr/bin/rsvg-convert

      - name: Commit generated vectors and metadata
        id: commit-generated
        working-directory: submission
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if git diff --quiet && [ -z "$(git status --short)" ]; then
            echo "No generated changes to commit."
            echo "generated_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pat_user_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${ICON_PACK_PAT}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)"
          pat_login="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["login"])')"
          pat_id="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "$pat_login"
          git config user.email "${pat_id}+${pat_login}@users.noreply.github.com"
          git add metadata.json svg submissions
          if find previews -maxdepth 1 -type f -name '*.png' -print -quit | grep --quiet .; then
            git add previews
          fi
          git commit -m "build(icon-pack): generate submitted vectors"
          git remote set-url origin "https://x-access-token:${ICON_PACK_PAT}@github.com/${HEAD_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"
          echo "generated_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment generated icon previews
        working-directory: submission
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          BASE_REPOSITORY: ${{ github.repository }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          GENERATED_SHA: ${{ steps.commit-generated.outputs.generated_sha }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 ../trusted/.github/scripts/icon_preview.py comment \
            --manifest /tmp/icon-preview-manifest.json \
            --repository "$BASE_REPOSITORY" \
            --head-repository "$HEAD_REPOSITORY" \
            --commit-sha "$GENERATED_SHA" \
            --pull-request "$PULL_REQUEST_NUMBER" \
            --token "$ICON_PACK_PAT"

  rebuild:
    name: Reconcile SVG icon pack
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Require branch and PAT
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$REF_TYPE" != "branch" ]; then
            echo "::error::Manual rebuilds must run against a branch."
            exit 1
          fi
          if [ -z "$ICON_PACK_PAT" ]; then
            echo "::error::Repository secret ICON_PACK_PAT is required."
            exit 1
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reconcile SVG icons
        run: |
          python3 .github/scripts/process_icon_submission.py \
            --mode rebuild \
            --random-digits 6

      - name: Commit reconciled icon pack
        env:
          ICON_PACK_PAT: ${{ secrets.ICON_PACK_PAT }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet && [ -z "$(git status --short)" ]; then
            echo "No rebuilt changes to commit."
            exit 0
          fi

          pat_user_json="$(curl --fail --silent --show-error \
            --header "Authorization: Bearer ${ICON_PACK_PAT}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user)"
          pat_login="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["login"])')"
          pat_id="$(printf '%s' "$pat_user_json" | python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])')"

          git config user.name "$pat_login"
          git config user.email "${pat_id}+${pat_login}@users.noreply.github.com"
          git add metadata.json svg submissions
          git commit -m "build(icon-pack): reconcile SVG icons"
          git remote set-url origin "https://x-access-token:${ICON_PACK_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${TARGET_BRANCH}"
